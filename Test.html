<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Báo cáo công việc</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#F6F8FA;overflow:hidden}
  iframe{border:0;width:100%;height:100%;display:block}
  .fallback{position:fixed;inset:0;display:none;place-items:center;padding:24px;
    font-family:'Be Vietnam Pro',system-ui,-apple-system,sans-serif}
  .fallback.show{display:grid}
  .fallback div{max-width:460px;text-align:center;background:#fff;border:1px solid #E4E8ED;
    border-radius:14px;padding:28px 26px;box-shadow:0 6px 20px rgba(20,32,46,.06)}
  .fallback h1{font-size:18px;margin:0 0 10px;color:#14202E}
  .fallback p{font-size:14.5px;color:#5B6876;line-height:1.6;margin:0 0 18px}
  .fallback a{display:inline-block;background:#116B8A;color:#fff;text-decoration:none;
    font-weight:600;font-size:14.5px;padding:11px 18px;border-radius:10px}
</style>
</head>
<body>

<!-- ============================================================
     Dán URL web app của bạn vào src bên dưới (kết thúc bằng /exec)
     Lấy tại: Apps Script > Deploy > Manage deployments > Web app URL
     ============================================================ -->
<iframe
  id="app"
  src="https://script.google.com/macros/s/AKfycbxhb9jKD8LUQlfMxNm-cmlNbXt-ugJz9A0ikgz3G8ptsUVkcDRXzcIcFluOoTXtUPYx/exec"
  allow="clipboard-write"></iframe>

<div class="fallback" id="fb">
  <div>
    <h1>Không tải được ứng dụng</h1>
    <p>Trình duyệt có thể đang chặn nội dung nhúng. Hãy mở trực tiếp bằng nút bên dưới, hoặc bật cookie của bên thứ ba cho trang này.</p>
    <a id="direct" href="#" target="_blank" rel="noopener">Mở trực tiếp</a>
  </div>
</div>

<script>
  var frame = document.getElementById('app');
  document.getElementById('direct').href = frame.src;
  var loaded = false;
  frame.addEventListener('load', function(){ loaded = true; });
  setTimeout(function(){
    if(!loaded) document.getElementById('fb').classList.add('show');
  }, 8000);
</script>
</body>
</html>
